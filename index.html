<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arcade Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c0d14;
        }
        /* تأثير التكبير المرن والناعم للمربعات */
        .game-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
        }
        .game-card:hover {
            transform: scale(1.06);
        }
    </style>
</head>
<body class="text-white min-h-screen font-sans">

    <header class="bg-[#181a26] border-b border-purple-500/10 py-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🎮</span>
            <h1 class="text-xl font-black tracking-wider bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
                ARCADE_HUB
            </h1>
        </div>
        <div class="text-xs bg-purple-500/10 text-purple-400 border border-purple-500/20 px-3 py-1.5 rounded-full font-medium">
            Live Games
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <h2 class="text-lg font-bold mb-6 text-gray-300 flex items-center gap-2">
            <span class="inline-block w-1.5 h-5 bg-purple-600 rounded-sm"></span>
            All Games
        </h2>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            
            <div class="game-card group relative aspect-square rounded-xl overflow-hidden bg-[#181a26] border border-gray-800 p-2 shadow-md hover:border-purple-500/50 hover:shadow-purple-500/10 cursor-pointer">
                <div class="w-full h-[80%] rounded-lg overflow-hidden bg-black">
                    <img src="8ball.png" alt="8 Ball Pool" class="w-full h-full object-cover">
                </div>
                <div class="h-[20%] flex items-center justify-center mt-1 px-1">
                    <span class="text-[11px] sm:text-xs font-bold text-gray-300 group-hover:text-white transition-colors truncate block w-full text-center">
                        8 Ball Pool
                    </span>
                </div>
            </div>

            <div class="game-card group relative aspect-square rounded-xl overflow-hidden bg-[#181a26] border border-gray-800 p-2 shadow-md hover:border-purple-500/50 cursor-pointer opacity-40">
                <div class="w-full h-[80%] bg-gray-800 rounded-lg flex items-center justify-center text-gray-500">
                    <span class="text-xs">Coming Soon</span>
                </div>
                <div class="h-[20%] flex items-center justify-center mt-1">
                    <span class="text-[11px] sm:text-xs font-bold text-gray-500">Next Game</span>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
